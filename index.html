
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroFi Studio — Умный Конвертер Макросов</title>
    <style>
        /* Полностью автономные стили: работают без интернета и VPN */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0b0b11;
            color: #cdd6f4;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        header {
            background-color: #11111e;
            border-bottom: 1px solid #252538;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #94e2d5 0%, #cba6f7 100%);
            color: #11111b;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(203, 166, 247, 0.2);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: #11111b;
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-text h1 span {
            font-size: 9px;
            background-color: rgba(203, 166, 247, 0.2);
            color: #cba6f7;
            padding: 2px 6px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: none;
            border: 1px solid rgba(203, 166, 247, 0.3);
        }

        .logo-text p {
            font-size: 11px;
            color: #a6adc8;
            margin-top: 2px;
        }

        .template-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-template {
            background-color: #181825;
            border: 1px solid #252538;
            color: #fff;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-template:hover {
            background-color: #313244;
            border-color: #cba6f7;
        }

        .btn-template svg {
            width: 14px;
            height: 14px;
        }

        main {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 1024px) {
            main {
                grid-template-columns: 5fr 7fr;
            }
        }

        .card {
            background-color: #11111e;
            border: 1px solid #252538;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .card-rainbow::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #cba6f7, #89b4fa);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 12px;
        }

        .card-title svg {
            width: 18px;
            height: 18px;
            fill: #f9e2af;
        }

        .card-desc {
            font-size: 12px;
            color: #a6adc8;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .textarea-container {
            position: relative;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            background-color: #08080f;
            border: 1px solid #313244;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #a6e3a1;
            resize: none;
            outline: none;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #cba6f7;
        }

        .btn-clear {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background-color: #181825;
            border: 1px solid #252538;
            color: #a6adc8;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            background-color: #e78284;
            color: #11111b;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(90deg, #cba6f7 0%, #89b4fa 100%);
            border: none;
            color: #11111b;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-primary svg {
            width: 16px;
            height: 16px;
            fill: #11111b;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .tab-btn {
            background-color: #181825;
            border: 1px solid #252538;
            color: #a6adc8;
            padding: 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .tab-btn.active {
            background-color: #cba6f7;
            color: #11111b;
            border-color: #cba6f7;
            box-shadow: 0 4px 12px rgba(203, 166, 247, 0.15);
        }

        .tab-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .form-fields {
            background-color: #08080f;
            border: 1px solid #252538;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 10px;
            color: #a6adc8;
            font-weight: 600;
        }

        .form-group input {
            background-color: #11111e;
            border: 1px solid #252538;
            border-radius: 8px;
            padding: 8px;
            color: #fff;
            font-size: 12px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #cba6f7;
        }

        .btn-add-manual {
            width: 100%;
            background-color: #181825;
            border: 1px solid #252538;
            color: #fff;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-add-manual:hover {
            border-color: #cba6f7;
            background-color: #252538;
        }

        .macro-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #252538;
            margin-bottom: 15px;
        }

        .macro-title-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            outline: none;
            padding: 2px 4px;
            transition: border-color 0.2s;
        }

        .macro-title-input:focus {
            border-color: #cba6f7;
        }

        .btn-clear-all {
            background-color: rgba(231, 130, 132, 0.1);
            border: 1px solid rgba(231, 130, 132, 0.2);
            color: #e78284;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear-all:hover {
            background-color: #e78284;
            color: #11111b;
        }

        .actions-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            min-height: 250px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            border: 2px dashed #252538;
            border-radius: 12px;
            background-color: rgba(8,8,15,0.3);
            color: #a6adc8;
            flex-grow: 1;
        }

        .empty-state svg {
            width: 32px;
            height: 32px;
            fill: #585b70;
            margin-bottom: 10px;
        }

        .action-item {
            background-color: #181825;
            border: 1px solid #252538;
            border-radius: 12px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.2s;
        }

        .action-item:hover {
            border-color: #cba6f7;
        }

        .action-main {
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .action-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-number {
            width: 24px;
            height: 24px;
            background-color: #313244;
            color: #cba6f7;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-title {
            font-size: 13px;
            font-weight: 800;
            color: #fff;
        }

        .action-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 6px;
            margin-top: 4px;
        }

        .badge-click {
            background-color: rgba(203, 166, 247, 0.15);
            color: #cba6f7;
            border: 1px solid rgba(203, 166, 247, 0.2);
        }

        .badge-delay {
            background-color: rgba(250, 179, 135, 0.15);
            color: #fab387;
            border: 1px solid rgba(250, 179, 135, 0.2);
        }

        .badge-image {
            background-color: rgba(166, 227, 161, 0.15);
            color: #a6e3a1;
            border: 1px solid rgba(166, 227, 161, 0.2);
        }

        .action-controls {
            display: flex;
            gap: 4px;
        }

        .control-btn {
            background-color: #252538;
            border: none;
            color: #fff;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background-color: #313244;
        }

        .control-btn.delete:hover {
            background-color: rgba(231, 130, 132, 0.2);
            color: #e78284;
        }

        .control-btn svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        .action-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 11px;
            color: #a6adc8;
            background-color: #08080f;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #252538;
        }

        .export-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #252538;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .format-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .format-label {
            font-size: 11px;
            font-weight: bold;
            color: #a6adc8;
        }

        .format-btns {
            display: flex;
            gap: 6px;
        }

        .format-btn {
            background-color: #181825;
            border: 1px solid #252538;
            color: #a6adc8;
            font-size: 10px;
            font-weight: 900;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .format-btn.active {
            background-color: #cba6f7;
            color: #11111b;
            border-color: #cba6f7;
        }

        .export-actions {
            display: flex;
            gap: 10px;
        }

        .btn-export {
            flex-grow: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-export.secondary {
            background-color: #181825;
            border: 1px solid #252538;
            color: #fff;
        }

        .btn-export.secondary:hover {
            background-color: #252538;
        }

        .btn-export.primary {
            background: linear-gradient(90deg, #94e2d5 0%, #cba6f7 100%);
            border: none;
            color: #11111b;
        }

        .btn-export.primary:hover {
            filter: brightness(1.1);
        }

        .btn-export svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .dropzone-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #252538;
            border-radius: 12px;
            background-color: rgba(8,8,15,0.4);
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dropzone-label:hover {
            border-color: #cba6f7;
            background-color: rgba(24,24,37,0.5);
        }

        .dropzone-label svg {
            width: 20px;
            height: 20px;
            fill: #a6adc8;
            margin-bottom: 5px;
        }

        .dropzone-text {
            font-size: 11px;
            color: #a6adc8;
        }

        .dropzone-text span {
            color: #cba6f7;
            font-weight: bold;
        }

        details {
            background-color: #08080f;
            border: 1px solid #252538;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
        }

        summary {
            font-size: 11px;
            font-weight: bold;
            color: #a6adc8;
            cursor: pointer;
            user-select: none;
            outline: none;
        }

        pre {
            font-family: monospace;
            font-size: 10px;
            color: #a6e3a1;
            background-color: #11111e;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            overflow-x: auto;
            max-height: 150px;
            border: 1px solid #252538;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #11111e;
            border: 2px solid #cba6f7;
            color: #fff;
            padding: 12px 18px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        .toast.active {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-icon {
            color: #cba6f7;
            display: flex;
            align-items: center;
        }

        .toast-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .toast-text p:first-child {
            font-size: 11px;
            font-weight: bold;
        }

        .toast-text p:last-child {
            font-size: 9px;
            color: #a6adc8;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M7.5 5.6L5.6 7.5L3.7 5.6L5.6 3.7L7.5 5.6M18.4 5.6L20.3 3.7L22.2 5.6L20.3 7.5L18.4 5.6M13 2H11V5H13V2M11 19H13V22H11V19M2 13V11H5V13H2M19 11H22V13H19V11M6 11.5L2 15.5L4.5 18L8.5 14L6 11.5M15.5 6L11.5 2L9 4.5L13 8.5L15.5 6M18 11.5L22 15.5L19.5 18L15.5 14L18 11.5M14 15.5L15.5 14L11.5 10L10 11.5L14 15.5Z"/></svg>
            </div>
            <div class="logo-text">
                <h1>MacroFi Studio <span>v2.8 Offline</span></h1>
                <p>Полностью автономная версия без зависимости от интернета</p>
            </div>
        </div>
        <div class="template-but
