```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIVATE FREEZE CLUMSY PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 0; }
        .content-layer { position: relative; z-index: 1; }
        .cyber-border { border: 1px solid #00ff41; background: rgba(10, 10, 10, 0.8); }
        .btn-inject { background: #bc00ff; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(188, 0, 255, 0.4); }
        .btn-inject.active { background: #ff0055; box-shadow: 0 0 30px #ff0055; animation: pulse 1s infinite; transform: scale(1.02); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <canvas id="snowCanvas"></canvas>

    <main class="content-layer max-w-2xl mx-auto space-y-6">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white tracking-widest uppercase">❄ Freeze Clumsy Pro ❄</h1>
        </header>

        <div class="cyber-border p-6 rounded-lg space-y-6">
            <!-- Кнопка Инжекта -->
            <button id="inject-btn" onclick="toggleInject()" class="w-full py-4 text-white font-bold rounded hover:opacity-90 transition uppercase btn-inject">
                INJECT
            </button>

            <!-- Кнопка Экстренной остановки (скрыта по умолчанию) -->
            <button id="emergency-btn" onclick="toggleInject()" class="hidden w-full py-2 bg-zinc-800 text-red-500 font-bold rounded border border-red-900 text-xs uppercase hover:bg-zinc-700">
                EMERGENCY STOP
            </button>

            <div id="terminal" class="bg-black border border-zinc-800 p-3 rounded h-24 overflow-y-auto text-[10px] text-zinc-500 font-mono">
                <div>[SYSTEM] Ожидание инициализации...</div>
            </div>
        </div>
    </main>

    <script>
        // Эффект снега
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const flakes = Array.from({length: 50}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3 + 1,
            speed: Math.random() * 1 + 0.5
        }));

        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            flakes.forEach(f => {
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                ctx.fill();
                f.y += f.speed;
                if (f.y > canvas.height) f.y = -5;
            });
            requestAnimationFrame(drawSnow);
        }
        drawSnow();

        // Логика кнопок
        let active = false;
        function toggleInject() {
            active = !active;
            const btn = document.getElementById('inject-btn');
            const emerg = document.getElementById('emergency-btn');
            const term = document.getElementById('terminal');

            if (active) {
                btn.innerText = "INJECTED";
                btn.classList.add('active');
                emerg.classList.remove('hidden');
                term.innerHTML += "<div>[SUCCESS] Драйвер внедрен. Модуль фриза активен.</div>";
            } else {
                btn.innerText = "INJECT";
                btn.classList.remove('active');
                emerg.classList.add('hidden');
                term.innerHTML += "<div>[WARN] Процесс остановлен.</div>";
            }
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
