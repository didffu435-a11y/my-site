```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREEZE CLUMSY PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .terminal-text { color: #22c55e; }
        .btn-injected { background: #9d174d !important; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen m-0">

    <div id="container" class="w-[90%] max-w-sm border border-emerald-900/50 p-6 bg-[#0a0a0a] rounded-lg shadow-2xl">
        <h1 class="text-center text-lg font-bold mb-6 tracking-widest">❄ FREEZE CLUMSY PRO ❄</h1>
        
        <button id="injectBtn" class="w-full py-3 bg-pink-600 font-bold rounded border border-pink-500 shadow-[0_0_10px_rgba(219,39,119,0.5)] hover:bg-pink-500 transition-all">
            INJECTED
        </button>

        <button id="stopBtn" class="w-full mt-3 py-2 border border-red-500 text-red-500 hover:bg-red-950 transition-all">
            EMERGENCY STOP
        </button>

        <div id="terminal" class="mt-6 p-4 border border-gray-800 bg-black text-sm h-32 overflow-y-auto">
            <div class="terminal-text">[SYSTEM] Ожидание инициализации...</div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const injectBtn = document.getElementById('injectBtn');
        const stopBtn = document.getElementById('stopBtn');

        function addLine(text) {
            const line = document.createElement('div');
            line.className = 'terminal-text mt-1';
            line.textContent = '> ' + text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        injectBtn.addEventListener('click', () => {
            if (injectBtn.classList.contains('btn-injected')) return;
            
            addLine("Запуск процесса инъекции...");
            injectBtn.textContent = "INJECTING...";
            
            setTimeout(() => {
                addLine("[SUCCESS] Драйвер внедрен. Модуль фриза активен.");
                injectBtn.textContent = "INJECTED";
                injectBtn.classList.add('btn-injected');
            }, 1500);
        });

        stopBtn.addEventListener('click', () => {
            addLine("[WARNING] Экстренная остановка!");
            addLine("[SYSTEM] Модули выгружены.");
            injectBtn.textContent = "INJECTED";
            injectBtn.classList.remove('btn-injected');
            injectBtn.style.background = ""; // Сброс цвета
        });
    </script>
</body>
</html>
