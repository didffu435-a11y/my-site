<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализатор Telegram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-5 text-center">Аналитика Telegram</h1>
        
        <input type="text" id="username" placeholder="Username канала" 
               class="w-full p-3 border rounded-lg mb-4">
               
        <button onclick="checkChannel()" 
                class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700">
                Проверить
        </button>
        
        <div class="mt-6">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        let myChart;

        async function checkChannel() {
            const username = document.getElementById('username').value;
            if(!username) return alert('Введите имя канала!');

            try {
                // Запрос отправляется на ваш же сервер Render без хардкода 127.0.0.1
                const response = await fetch(`/api/history/${username}`);
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                const labels = data.map(item => item.date.slice(11, 16));
                const values = data.map(item => item.subscribers);

                const ctx = document.getElementById('myChart').getContext('2d');
                
                if (myChart) {
                    myChart.destroy();
                }

                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Подписчики',
                            data: values,
                            borderColor: 'rgb(75, 192, 192)',
                            tension: 0.1
                        }]
                    }
                });
            } catch (err) {
                console.error("Ошибка при получении данных:", err);
                alert("Не удалось получить данные от сервера.");
            }
        }
    </script>
</body>
</html>
